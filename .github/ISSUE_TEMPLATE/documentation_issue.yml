name: Documentation issue
description: Report unclear, outdated, or incorrect documentation
title: "[Docs] "
labels: [documentation]
body:
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or wrong?
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: File or section
      description: Example: README.md, docs/profiles/PROFILE_REFERENCE.md, website block.
    validations:
      required: false
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
    validations:
      required: false

name: Bug report
description: Report a RandomDay issue
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste UE4SS.log lines around RandomDay startup.
      render: text
  - type: textarea
    id: files
    attributes:
      label: Relevant files
      description: Include SandboxSettings.ini marker lines and adapter config snippets if relevant.

name: Feature request
description: Suggest a controlled improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Operational risk
      description: What could break or become unstable?
